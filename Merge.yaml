# 你的全局扩展配置（Merge）里只需要留这干净的一段：
dns:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1

  nameserver-policy:
    "geosite:cn": [https://dns.alicdn.com/dns-query, https://doh.pub/dns-query]
    "geosite:private": [223.5.5.5]

  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - https://dns.cloudflare.com/dns-query

  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
